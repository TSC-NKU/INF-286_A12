<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A12</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container text-center">
        <div class="section my-4">
            <h2>Click Interaction</h2>
            <button class="btn btn-primary" id="clickBtn">Click Me</button>
            <p id="clickMessage" class="mt-3">Waiting for a click...</p>
        </div>
        <div class="section my-4">
            <h2>Toggle Interaction</h2>
            <button class="btn btn-primary" id="toggleBtn">Show More</button>
            <div id="toggleBox" class="mt-3">This is the content that will be shown or hidden.</div>
        </div>
        <div class="section my-4">
            <h2>Data Display</h2>
            <button class="btn btn-primary" id="loadBtn">Load Resources</button>
            <ul id="resourceList" class="mt-3 list-unstyled"></ul>
        </div>
        <div class="section my-4">
            <h2>Reflection</h2>
            <div class="mt-3">
                <p><strong>DOM is...</strong> the interface for html to be manipulated.</p>
                <p><strong>An event listener is...</strong> a function that represents when the user performs an action.</p>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
